<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      .bg { fill: #D4AF37; }
      .letter { fill: #FFFFFF; font-family: Georgia, serif; font-size: 60px; font-weight: bold; }
      .accent { fill: #FFFFFF; opacity: 0.7; }
    </style>
  </defs>

  <!-- Background with rounded corners -->
  <rect class="bg" width="100" height="100" rx="12"/>

  <!-- Main Letter - R for Rafael -->
  <text class="letter" x="50" y="72" text-anchor="middle">R</text>

  <!-- Top decorative line (representing balance/justice) -->
  <rect class="accent" x="20" y="15" width="60" height="3" rx="1.5"/>

  <!-- Vertical accent lines -->
  <rect class="accent" x="25" y="20" width="2" height="15" rx="1"/>
  <rect class="accent" x="73" y="20" width="2" height="15" rx="1"/>
</svg>